<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>蓄電池リース ラインナップ｜ミライエコ＋</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    color: #1a2a3a;
    padding-bottom: 120px;
  }

  header {
    background: linear-gradient(90deg, #1e40af, #2563eb);
    padding: 14px 20px;
    box-shadow: 0 4px 16px rgba(30,64,175,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .header-center {
    text-align: center;
    flex: 1;
  }

  .header-logo {
    position: absolute;
    right: 20px;
    top: 50%;
    transform: translateY(-50%);
  }

  .header-logo img {
    height: 78px;
    width: auto;
    object-fit: contain;
  }

  .logo-area { display: flex; align-items: center; justify-content: center; gap: 10px; flex-wrap: wrap; }
  header h1 { font-size: 1.4rem; font-weight: 900; color: #fff; letter-spacing: 0.05em; }
  header p { font-size: 0.78rem; color: rgba(255,255,255,0.85); margin-top: 4px; }
  .badge-sbi { background: #fff; color: #1e40af; font-size: 0.65rem; font-weight: 700; padding: 2px 8px; border-radius: 4px; }

  .container { max-width: 1280px; margin: 0 auto; padding: 16px 16px 40px; }

  .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  .updated { font-size: 0.72rem; color: #64748b; }
  .result-count { font-size: 0.72rem; color: #64748b; }

  .filter-section {
    background: #fff; border-radius: 10px; padding: 12px 16px;
    margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .filter-row:last-child { margin-bottom: 0; }
  .filter-label { font-size: 0.7rem; font-weight: 700; color: #475569; width: 72px; flex-shrink: 0; }

  .filter-scroll-wrap {
    flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch;
    scrollbar-width: none; padding-bottom: 2px;
  }
  .filter-scroll-wrap::-webkit-scrollbar { display: none; }
  .filter-scroll-inner { display: flex; gap: 6px; width: max-content; }

  .filter-btns { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }

  .filter-btn {
    padding: 4px 12px; border-radius: 16px; border: 2px solid #cbd5e1;
    background: #fff; color: #475569; font-size: 0.75rem; cursor: pointer;
    transition: all 0.15s; font-weight: 600; user-select: none;
    white-space: nowrap; flex-shrink: 0;
  }
  .filter-btn:hover { border-color: #2563eb; color: #2563eb; }
  .filter-btn.active { background: #2563eb; border-color: #2563eb; color: #fff; box-shadow: 0 2px 6px rgba(37,99,235,0.3); }
  .filter-btn.orange.active { background: #f97316; border-color: #f97316; box-shadow: 0 2px 6px rgba(249,115,22,0.3); }

  .reset-btn {
    padding: 4px 12px; border-radius: 16px; border: 2px solid #e2e8f0;
    background: #f8fafc; color: #94a3b8; font-size: 0.72rem; cursor: pointer;
    font-weight: 600; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
  }
  .reset-btn:hover { border-color: #94a3b8; color: #475569; }

  .maker-section { margin-bottom: 20px; }
  .maker-label {
    display: inline-flex; align-items: center;
    background: linear-gradient(90deg, #1e40af, #3b82f6);
    color: #fff; font-size: 0.8rem; font-weight: 700;
    padding: 5px 14px; border-radius: 6px 6px 0 0;
  }
  .cards {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 8px; background: #fff; border: 2px solid #e2e8f0;
    border-radius: 0 10px 10px 10px; padding: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  .card {
    background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 8px;
    padding: 10px; display: flex; flex-direction: column; gap: 4px;
    transition: transform 0.15s, box-shadow 0.15s; position: relative;
  }
  .card:hover { transform: translateY(-2px); box-shadow: 0 4px 14px rgba(0,0,0,0.1); }
  .card.sochiku { border-color: #fed7aa; background: #fff7ed; }
  .card.in-compare { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.2); }

  .sochiku-badge {
    display: inline-block; background: linear-gradient(90deg, #f97316, #fb923c);
    color: #fff; font-size: 0.58rem; font-weight: 700;
    padding: 2px 6px; border-radius: 8px; white-space: nowrap; width: fit-content;
  }
  .type-badges { display: flex; gap: 3px; flex-wrap: wrap; }
  .type-badge { font-size: 0.58rem; font-weight: 700; padding: 1px 5px; border-radius: 3px; }
  .type-badge.hybrid { background: #dbeafe; color: #1d4ed8; }
  .type-badge.single { background: #f1f5f9; color: #475569; }
  .type-badge.v2h    { background: #d1fae5; color: #065f46; }
  .type-badge.load   { background: #fef3c7; color: #92400e; }

  .card-name { font-size: 0.82rem; font-weight: 700; color: #1e293b; line-height: 1.3; }
  .card-capacity { font-size: 1.25rem; font-weight: 900; color: #1e40af; line-height: 1; letter-spacing: -0.02em; }

  .price-area { border-top: 1px solid #e2e8f0; padding-top: 6px; margin-top: 2px; }
  .price-label { font-size: 0.6rem; color: #94a3b8; margin-bottom: 1px; }
  .price-main { font-size: 1.2rem; font-weight: 900; color: #f97316; line-height: 1; }
  .price-main span { font-size: 0.68rem; font-weight: 400; color: #94a3b8; margin-left: 1px; }
  .price-tax { font-size: 0.65rem; color: #94a3b8; margin-top: 1px; }

  .catalog-btn {
    display: block; margin-top: 6px; padding: 5px 0;
    background: linear-gradient(90deg, #2563eb, #3b82f6);
    color: #fff; font-size: 0.7rem; font-weight: 700;
    text-align: center; border-radius: 6px; text-decoration: none;
    transition: opacity 0.15s;
  }
  .catalog-btn:hover { opacity: 0.85; }

  .compare-toggle-btn {
    display: block; margin-top: 6px; padding: 5px 0;
    background: #f1f5f9; border: 2px solid #cbd5e1;
    color: #475569; font-size: 0.7rem; font-weight: 700;
    text-align: center; border-radius: 6px; cursor: pointer;
    transition: all 0.15s; width: 100%;
  }
  .compare-toggle-btn:hover { border-color: #2563eb; color: #2563eb; background: #eff6ff; }
  .compare-toggle-btn.added { background: #eff6ff; border-color: #2563eb; color: #2563eb; }

  #compare-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #1e293b; border-top: 3px solid #2563eb;
    padding: 10px 16px; z-index: 100;
    transform: translateY(100%); transition: transform 0.3s ease;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.3);
  }
  #compare-bar.visible { transform: translateY(0); }

  .compare-bar-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
  .compare-bar-title { font-size: 0.8rem; font-weight: 700; color: #fff; }
  .compare-bar-actions { display: flex; gap: 8px; }

  .compare-clear-btn {
    padding: 4px 12px; border-radius: 12px; border: 1px solid #475569;
    background: transparent; color: #94a3b8; font-size: 0.72rem; cursor: pointer; font-weight: 600;
  }
  .compare-clear-btn:hover { border-color: #94a3b8; color: #fff; }

  .compare-view-btn {
    padding: 4px 14px; border-radius: 12px; background: #2563eb;
    border: none; color: #fff; font-size: 0.72rem; cursor: pointer; font-weight: 700;
  }
  .compare-view-btn:hover { background: #1d4ed8; }

  .compare-items { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; padding-bottom: 2px; }
  .compare-items::-webkit-scrollbar { display: none; }

  .compare-item {
    background: #334155; border-radius: 8px; padding: 6px 10px;
    min-width: 140px; flex-shrink: 0; position: relative;
  }
  .compare-item-name  { font-size: 0.72rem; font-weight: 700; color: #e2e8f0; }
  .compare-item-cap   { font-size: 0.82rem; font-weight: 900; color: #60a5fa; }
  .compare-item-price { font-size: 0.7rem; color: #fb923c; font-weight: 700; }
  .compare-item-cost  { font-size: 0.65rem; color: #94a3b8; margin-top: 2px; }
  .compare-item-remove {
    position: absolute; top: 4px; right: 6px;
    background: none; border: none; color: #64748b; font-size: 0.9rem; cursor: pointer; line-height: 1;
  }
  .compare-item-remove:hover { color: #f87171; }

  #compare-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 200;
    align-items: center; justify-content: center; padding: 16px;
  }
  #compare-modal.open { display: flex; }

  .modal-inner {
    background: #fff; border-radius: 14px; width: 100%; max-width: 900px;
    max-height: 90vh; overflow-y: auto; padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-title { font-size: 1.1rem; font-weight: 900; color: #1e293b; }
  .modal-close { background: none; border: none; font-size: 1.4rem; cursor: pointer; color: #94a3b8; }
  .modal-close:hover { color: #1e293b; }

  .compare-table { display: grid; gap: 10px; }

  .compare-card { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 10px; padding: 14px; }
  .compare-card.best { border-color: #f97316; background: #fff7ed; }
  .compare-card-maker { font-size: 0.7rem; color: #64748b; margin-bottom: 2px; }
  .compare-card-name  { font-size: 0.9rem; font-weight: 700; color: #1e293b; margin-bottom: 4px; }
  .compare-card-cap   { font-size: 1.5rem; font-weight: 900; color: #1e40af; line-height: 1; margin-bottom: 8px; }

  .compare-stat { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 1px solid #e2e8f0; }
  .compare-stat:last-child { border-bottom: none; }
  .compare-stat-label { font-size: 0.72rem; color: #64748b; }
  .compare-stat-val   { font-size: 0.9rem; font-weight: 700; color: #1e293b; }
  .compare-stat-val.highlight { color: #f97316; font-size: 1.05rem; }
  .compare-stat-val.best-val  { color: #16a34a; }

  .best-badge {
    display: inline-block; background: #f97316; color: #fff;
    font-size: 0.62rem; font-weight: 700; padding: 2px 7px; border-radius: 8px; margin-bottom: 6px;
  }

  .no-result { text-align: center; padding: 40px 20px; color: #94a3b8; font-size: 0.9rem; background: #fff; border-radius: 10px; }

  .note {
    background: #fff; border-left: 4px solid #f97316; border-radius: 4px;
    padding: 12px 16px; font-size: 0.72rem; color: #64748b;
    line-height: 1.8; margin-top: 8px; box-shadow: 0 2px 6px rgba(0,0,0,0.04);
  }

  footer {
    text-align: center; padding: 20px; font-size: 0.7rem; color: #94a3b8;
    border-top: 1px solid #e2e8f0; background: #fff; margin-top: 32px;
  }

  @media (max-width: 600px) {
    header h1 { font-size: 1.1rem; }
    .header-logo img { height: 36px; }
    .container { padding: 12px 10px 40px; }
    .cards { grid-template-columns: 1fr 1fr; gap: 6px; padding: 8px; }
    .card { padding: 8px; }
    .card-capacity { font-size: 1.05rem; }
    .price-main { font-size: 1rem; }
    .filter-label { width: 56px; font-size: 0.68rem; }
    .filter-btn { font-size: 0.7rem; padding: 3px 9px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-center">
    <div class="logo-area">
      <span class="badge-sbi">SBI 新生銀行グループ</span>
      <h1 id="page-title">ミライエコ＋ 蓄電池リース</h1>
    </div>
    <p>最新ラインナップ・リース料金一覧</p>
  </div>
  <div class="header-logo">
    <img src="makingenergy1.png" alt="Making Energy ロゴ">
  </div>
</header>

<div class="container">
  <div class="top-bar">
    <div class="updated" id="updated"></div>
    <div class="result-count" id="result-count"></div>
  </div>

  <div class="filter-section" id="filter-section">
    <div class="filter-row" id="row-maker">
      <div class="filter-label">メーカー</div>
      <div class="filter-scroll-wrap">
        <div class="filter-scroll-inner" id="filter-maker"></div>
      </div>
    </div>
    <div class="filter-row" id="row-type">
      <div class="filter-label">タイプ</div>
      <div class="filter-btns">
        <button class="filter-btn" data-group="type" data-val="ハイブリッド" onclick="toggleFilter(this)">ハイブリッド</button>
        <button class="filter-btn" data-group="type" data-val="単機能" onclick="toggleFilter(this)">単機能</button>
        <button class="filter-btn" data-group="type" data-val="V2H" onclick="toggleFilter(this)">V2H</button>
      </div>
    </div>
    <div class="filter-row" id="row-load">
      <div class="filter-label">負荷タイプ</div>
      <div class="filter-btns">
        <button class="filter-btn" data-group="load" data-val="全負荷" onclick="toggleFilter(this)">全負荷</button>
        <button class="filter-btn" data-group="load" data-val="特定負荷" onclick="toggleFilter(this)">特定負荷</button>
      </div>
    </div>
    <div class="filter-row" id="row-sochiku">
      <div class="filter-label">割引</div>
      <div class="filter-btns">
        <button class="filter-btn orange" data-group="sochiku" data-val="true" onclick="toggleFilter(this)">🔶 創蓄連携割引対象のみ</button>
      </div>
      <button class="reset-btn" onclick="resetFilters()">リセット</button>
    </div>
  </div>

  <div id="lineup"></div>
  <div class="note" id="note-text"></div>
</div>

<footer>
  株式会社メイキングエナジー｜TEL: 0857-88-9731<br>
  鳥取支店：鳥取市吉方温泉4-719 MORIビル2F｜福岡支店：久留米市本町2-23 豊国産業ビル2F
</footer>

<div id="compare-bar">
  <div class="compare-bar-header">
    <div class="compare-bar-title">📊 コスパ比較中 <span id="compare-count"></span></div>
    <div class="compare-bar-actions">
      <button class="compare-clear-btn" onclick="clearCompare()">クリア</button>
      <button class="compare-view-btn" onclick="openModal()">比較する</button>
    </div>
  </div>
  <div class="compare-items" id="compare-items"></div>
</div>

<div id="compare-modal">
  <div class="modal-inner">
    <div class="modal-header">
      <div class="modal-title">📊 コスパ比較</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="compare-table" id="compare-table"></div>
  </div>
</div>

<script>
  let allProducts = [];
  let settings = {};
  const activeFilters = { maker: [], type: [], load: [], sochiku: [] };
  let compareList = [];

  const ts = '?t=' + Date.now();

  Promise.all([
    fetch('settings.json' + ts).then(r => r.json()),
    fetch('lineup.json' + ts).then(r => r.json())
  ]).then(([s, d]) => {
    settings = s;
    allProducts = d.products.map((p, i) => ({ ...p, _id: i }));
    applySettings();
    document.getElementById('updated').textContent = '最終更新：' + d.updated;
    buildMakerFilters(allProducts);
    renderCards(allProducts);
  }).catch(() => {
    document.getElementById('lineup').innerHTML = '<div class="no-result">データの読み込みに失敗しました。</div>';
  });

  function applySettings() {
    const f = settings.features || {};
    const d = settings.display || {};
    if (d.page_title) {
      document.getElementById('page-title').textContent = d.page_title;
      document.title = d.page_title + ' | ミライエコ＋';
    }
    if (d.note_text) {
      document.getElementById('note-text').innerHTML = d.note_text.replace(/\n/g, '<br>');
    }
    if (f.filter_maker === false) document.getElementById('row-maker').style.display = 'none';
    if (f.filter_type  === false) document.getElementById('row-type').style.display = 'none';
    if (f.filter_load  === false) document.getElementById('row-load').style.display = 'none';
    if (f.filter_sochiku === false) document.getElementById('row-sochiku').style.display = 'none';
    const anyFilter = f.filter_maker !== false || f.filter_type !== false ||
                      f.filter_load !== false || f.filter_sochiku !== false;
    if (!anyFilter) document.getElementById('filter-section').style.display = 'none';
    if (f.compare_mode === false) document.getElementById('compare-bar').style.display = 'none';
  }

  function buildMakerFilters(products) {
    const makers = [...new Set(products.map(p => p.maker))];
    document.getElementById('filter-maker').innerHTML = makers.map(m =>
      `<button class="filter-btn" data-group="maker" data-val="${m}" onclick="toggleFilter(this)">${m}</button>`
    ).join('');
  }

  function toggleFilter(btn) {
    const group = btn.dataset.group;
    const val = btn.dataset.val;
    const idx = activeFilters[group].indexOf(val);
    if (idx === -1) { activeFilters[group].push(val); btn.classList.add('active'); }
    else { activeFilters[group].splice(idx, 1); btn.classList.remove('active'); }
    applyFilters();
  }

  function resetFilters() {
    Object.keys(activeFilters).forEach(k => activeFilters[k] = []);
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    renderCards(allProducts);
  }

  function applyFilters() {
    let filtered = allProducts;
    if (activeFilters.maker.length)   filtered = filtered.filter(p => activeFilters.maker.includes(p.maker));
    if (activeFilters.type.length)    filtered = filtered.filter(p => activeFilters.type.includes(p.type));
    if (activeFilters.load.length)    filtered = filtered.filter(p => activeFilters.load.includes(p.load));
    if (activeFilters.sochiku.length) filtered = filtered.filter(p => p.sochiku === true);
    renderCards(filtered);
  }

  function calcCostPerKwh(p) {
    const cap = parseFloat(p.capacity);
    if (isNaN(cap) || cap <= 0) return null;
    return Math.round(p.price_ex / cap);
  }

  function renderCards(products) {
    const f = settings.features || {};
    const container = document.getElementById('lineup');
    document.getElementById('result-count').textContent = products.length + '件表示中';
    if (!products.length) {
      container.innerHTML = '<div class="no-result">条件に合う製品が見つかりませんでした。</div>';
      return;
    }
    const grouped = {};
    products.forEach(p => { if (!grouped[p.maker]) grouped[p.maker] = []; grouped[p.maker].push(p); });

    container.innerHTML = Object.entries(grouped).map(([maker, items]) => `
      <div class="maker-section">
        <div class="maker-label">${maker}</div>
        <div class="cards">
          ${items.map(p => {
            const inCompare = compareList.some(c => c._id === p._id);
            const typeBadge = p.type === 'ハイブリッド' ? '<span class="type-badge hybrid">ハイブリッド</span>'
              : p.type === 'V2H' ? '<span class="type-badge v2h">V2H</span>'
              : '<span class="type-badge single">単機能</span>';
            const loadBadge = p.load !== 'なし' ? `<span class="type-badge load">${p.load}</span>` : '';
            const catalogBtn = (f.catalog_link !== false && p.url)
              ? `<a href="${p.url}" target="_blank" rel="noopener" class="catalog-btn">📄 カタログはこちら</a>` : '';
            const compareBtn = f.compare_mode !== false
              ? `<button class="compare-toggle-btn ${inCompare ? 'added' : ''}" onclick="toggleCompare(${p._id})">
                   ${inCompare ? '✓ 比較中' : '＋ 比較に追加'}
                 </button>` : '';
            const taxLine = f.show_tax_price !== false
              ? `<div class="price-tax">税込 ${p.price_in.toLocaleString()}円/月</div>` : '';
            return `
              <div class="card ${p.sochiku ? 'sochiku' : ''} ${inCompare ? 'in-compare' : ''}" id="card-${p._id}">
                ${p.sochiku ? '<div class="sochiku-badge">🔶 創蓄連携割引対象</div>' : ''}
                <div class="type-badges">${typeBadge}${loadBadge}</div>
                <div class="card-name">${p.name}</div>
                <div class="card-capacity">${p.capacity}</div>
                <div class="price-area">
                  <div class="price-label">月々リース料（税抜）</div>
                  <div class="price-main">${p.price_ex.toLocaleString()}<span>円/月</span></div>
                  ${taxLine}
                </div>
                ${catalogBtn}
                ${compareBtn}
              </div>
            `;
          }).join('')}
        </div>
      </div>
    `).join('');
  }

  function toggleCompare(id) {
    if ((settings.features || {}).compare_mode === false) return;
    const p = allProducts.find(p => p._id === id);
    const idx = compareList.findIndex(c => c._id === id);
    if (idx === -1) {
      if (compareList.length >= 6) { alert('比較できるのは最大6件です'); return; }
      compareList.push(p);
    } else {
      compareList.splice(idx, 1);
    }
    updateCompareBar();
    const card = document.getElementById('card-' + id);
    if (card) {
      const inCompare = compareList.some(c => c._id === id);
      card.classList.toggle('in-compare', inCompare);
      const btn = card.querySelector('.compare-toggle-btn');
      if (btn) { btn.textContent = inCompare ? '✓ 比較中' : '＋ 比較に追加'; btn.classList.toggle('added', inCompare); }
    }
  }

  function updateCompareBar() {
    const bar = document.getElementById('compare-bar');
    const itemsEl = document.getElementById('compare-items');
    const countEl = document.getElementById('compare-count');
    if (compareList.length === 0) { bar.classList.remove('visible'); return; }
    bar.classList.add('visible');
    countEl.textContent = `（${compareList.length}件選択中）`;
    itemsEl.innerHTML = compareList.map(p => {
      const cpr = calcCostPerKwh(p);
      return `
        <div class="compare-item">
          <button class="compare-item-remove" onclick="toggleCompare(${p._id})">✕</button>
          <div class="compare-item-name">${p.maker} ${p.name}</div>
          <div class="compare-item-cap">${p.capacity}</div>
          <div class="compare-item-price">${p.price_ex.toLocaleString()}円/月</div>
          ${cpr ? `<div class="compare-item-cost">${cpr.toLocaleString()}円/kWh</div>` : ''}
        </div>
      `;
    }).join('');
  }

  function clearCompare() {
    compareList = [];
    updateCompareBar();
    document.querySelectorAll('.card.in-compare').forEach(c => {
      c.classList.remove('in-compare');
      const btn = c.querySelector('.compare-toggle-btn');
      if (btn) { btn.textContent = '＋ 比較に追加'; btn.classList.remove('added'); }
    });
  }

  function openModal() {
    if (compareList.length < 2) { alert('2件以上選択してください'); return; }
    const modal = document.getElementById('compare-modal');
    const table = document.getElementById('compare-table');
    modal.classList.add('open');
    const costs = compareList.map(p => calcCostPerKwh(p)).filter(v => v !== null);
    const bestCost = costs.length ? Math.min(...costs) : null;
    const cols = Math.min(compareList.length, 3);
    table.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
    table.innerHTML = compareList.map(p => {
      const cpr = calcCostPerKwh(p);
      const isBestCost = cpr !== null && cpr === bestCost;
      return `
        <div class="compare-card ${isBestCost ? 'best' : ''}">
          ${isBestCost ? '<div class="best-badge">🏆 コスパ最良</div>' : ''}
          <div class="compare-card-maker">${p.maker}</div>
          <div class="compare-card-name">${p.name}</div>
          <div class="compare-card-cap">${p.capacity}</div>
          <div class="compare-stat">
            <span class="compare-stat-label">月額（税抜）</span>
            <span class="compare-stat-val highlight">${p.price_ex.toLocaleString()}円</span>
          </div>
          <div class="compare-stat">
            <span class="compare-stat-label">月額（税込）</span>
            <span class="compare-stat-val">${p.price_in.toLocaleString()}円</span>
          </div>
          <div class="compare-stat">
            <span class="compare-stat-label">円/kWh</span>
            <span class="compare-stat-val ${isBestCost ? 'best-val' : ''}">
              ${cpr ? cpr.toLocaleString() + '円' : '―'}
            </span>
          </div>
          <div class="compare-stat">
            <span class="compare-stat-label">タイプ</span>
            <span class="compare-stat-val">${p.type}</span>
          </div>
          <div class="compare-stat">
            <span class="compare-stat-label">負荷タイプ</span>
            <span class="compare-stat-val">${p.load}</span>
          </div>
          <div class="compare-stat">
            <span class="compare-stat-label">創蓄連携割引</span>
            <span class="compare-stat-val">${p.sochiku ? '✅ 対象' : '―'}</span>
          </div>
        </div>
      `;
    }).join('');
  }

  function closeModal() { document.getElementById('compare-modal').classList.remove('open'); }
  document.getElementById('compare-modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });
</script>
</body>
</html>
